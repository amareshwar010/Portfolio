                    <main>
                        <section>
                            <tr>
                                <td>
                                    <form action="">
                                        <table align="center" border="1" cellspacing="0" cellpadding="8" width="400"
                                            height="400">
                                            <tr>
                                                <th colspan="2">
                                                    <font size="5" color="DarkMagnet">🌟 Contact Form 🌟</font>
                                                </th>
                                            </tr>

                                            <tr>
                                                <td><label for="">Full Name:</label></td>
                                                <td>
                                                    <input type="text" placeholder="Enter Your Name" />
                                                </td>
                                            </tr>

                                            <tr>
                                                <td><label for="">Email:</label></td>
                                                <td><input type="email" placeholder="Enter Your Email" /></td>
                                            </tr>

                                            <tr>
                                                <td><label for="">Subject:</label></td>
                                                <td><select name="" id="">
                                                        <option value="Internship Opportunity">💼 Internship Opportunity
                                                        </option>
                                                        <option value="Job Opportunity">💻 Job Opportunity</option>
                                                        <option value="Collaboration">🤝 Collaboration</option>
                                                        <option value="Project Discussion">📂 Project Discussion
                                                        </option>
                                                        <option value="General Inquiry">💬 General Inquiry</option>
                                                        <option value="Other">✉️ Other</option>
                                                    </select></td>
                                            </tr>
                                            <tr>
                                                <td><label for="">Message:</label></td>
                                                <td><input type="text" placeholder="enter your message"></td>
                                            </tr>

                                            <tr>
                                                <td colspan="2" align="right">
                                                    <input type="button" value="Submit">
                                                    <input type="reset" value="Reset">
                                                </td>

                                            </tr>
